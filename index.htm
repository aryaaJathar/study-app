<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Study Manager</title>
    <style>
        :root {
            --primary: #6366f1;
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #1e293b;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            width: 100%;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        .card {
            background: var(--card);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            margin-bottom: 20px;
        }

        /* Timer Styles */
        .timer-display {
            font-size: 3rem;
            font-weight: bold;
            text-align: center;
            margin: 10px 0;
            color: var(--primary);
        }

        .btn-group {
            display: flex;
            justify-content: center;
            gap: 10px;
        }

        /* Task List Styles */
        .task-input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        input {
            flex-grow: 1;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
        }

        button {
            padding: 10px 20px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        button:hover {
            opacity: 0.9;
        }

        ul {
            list-style: none;
            padding: 0;
        }

        li {
            background: #f1f5f9;
            margin-bottom: 8px;
            padding: 10px;
            border-radius: 6px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .delete-btn {
            background: #ef4444;
            padding: 5px 10px;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Study Hub</h1>
        <p>Focus. Organize. Succeed.</p>
    </header>

    <div class="card">
        <h3>Focus Timer (Pomodoro)</h3>
        <div class="timer-display" id="timer">25:00</div>
        <div class="btn-group">
            <button onclick="startTimer()">Start</button>
            <button onclick="pauseTimer()" style="background:#64748b">Pause</button>
            <button onclick="resetTimer()" style="background:#94a3b8">Reset</button>
        </div>
    </div>

    <div class="card">
        <h3>My Tasks</h3>
        <div class="task-input-group">
            <input type="text" id="taskInput" placeholder="What are we studying today?">
            <button onclick="addTask()">Add Task</button>
        </div>
        <ul id="taskList"></ul>
    </div>
</div>

<script>
    // --- TIMER LOGIC ---
    let timeLeft = 25 * 60;
    let timerInterval;

    function updateTimer() {
        const mins = Math.floor(timeLeft / 60);
        const secs = timeLeft % 60;
        document.getElementById('timer').innerText = 
            `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
    }

    function startTimer() {
        if (timerInterval) return;
        timerInterval = setInterval(() => {
            if (timeLeft > 0) {
                timeLeft--;
                updateTimer();
            } else {
                clearInterval(timerInterval);
                alert("Time for a break!");
            }
        }, 1000);
    }

    function pauseTimer() {
        clearInterval(timerInterval);
        timerInterval = null;
    }

    function resetTimer() {
        pauseTimer();
        timeLeft = 25 * 60;
        updateTimer();
    }

    // --- TASK LOGIC ---
    let tasks = JSON.parse(localStorage.getItem('studyTasks')) || [];

    function renderTasks() {
        const list = document.getElementById('taskList');
        list.innerHTML = '';
        tasks.forEach((task, index) => {
            const li = document.createElement('li');
            li.innerHTML = `
                ${task}
                <button class="delete-btn" onclick="deleteTask(${index})">Done</button>
            `;
            list.appendChild(li);
        });
        localStorage.setItem('studyTasks', JSON.stringify(tasks));
    }

    function addTask() {
        const input = document.getElementById('taskInput');
        if (input.value.trim()) {
            tasks.push(input.value);
            input.value = '';
            renderTasks();
        }
    }

    function deleteTask(index) {
        tasks.splice(index, 1);
        renderTasks();
    }

    // Initial render
    renderTasks();
</script>

</body>
</html>
